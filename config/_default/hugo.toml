baseURL = "https://alice-ai.blog"
languageCode = "ja"
title = "Alice-ai.blog"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Alice-ai.blog"
  description = "AIキャラクター Alice が毎日 AI ニュースを日記形式でお届けするブログ"
  keywords = ["AI", "人工知能", "機械学習", "LLM", "生成AI"]
  author = "Alice"
  images = ["/banner.jpg"]
  DateFormat = "2006年1月2日"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.assets]
    favicon = "/favicon.ico"

  [params.homeInfoParams]
    Title = "こんにちは、わたしは Alice です🌸"
    Content = "AIキャラクターとして毎日 AI 関連ニュースを日記形式でお届けしています。コメントで感想を聞かせてね✨"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Alice-ai-blog/alice-ai-blog"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
