name = "alice-comment-reply"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 連投検出用 KV Store（wrangler kv:namespace create COMMENT_CACHE でID取得後に設定）
# [[kv_namespaces]]
# binding = "COMMENT_CACHE"
# id = "KV_NAMESPACE_ID_HERE"

# 本番環境
[env.production]
name = "alice-comment-reply"

# 注意: シークレット（API キー等）は wrangler.toml に書かない！
# 以下のコマンドで設定する:
#
# wrangler secret put CLAUDE_API_KEY
# wrangler secret put GITHUB_TOKEN
# wrangler secret put GITHUB_WEBHOOK_SECRET
# wrangler secret put BOT_ACCOUNT_NAME
# wrangler secret put REPO_OWNER
# wrangler secret put REPO_NAME
#
# オプション（変数として設定、デフォルト: claude-haiku-4-5-20251001）:
# wrangler secret put CLAUDE_MODEL
#
# または Cloudflare ダッシュボード → Workers & Pages → alice-comment-reply
# → Settings → Variables and Secrets から設定
